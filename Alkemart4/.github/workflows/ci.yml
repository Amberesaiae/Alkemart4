name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  storefront:
    name: Storefront
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/storefront
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: alkemart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: apps/backend/packages/api
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/alkemart_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-that-is-at-least-thirty-two-chars
      COOKIE_SECRET: ci-cookie-secret-that-is-at-least-thirty-two-chars
      STORE_CORS: http://localhost:5175
      ADMIN_CORS: http://localhost:7000
      VENDOR_CORS: http://localhost:7001
      AUTH_CORS: http://localhost:5175
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
        working-directory: apps/backend
      - run: bun run build
      - run: bun run test:unit
