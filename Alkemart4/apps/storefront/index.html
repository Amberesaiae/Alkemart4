<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alkemart — Ghana multi-vendor marketplace</title>
    <meta
      name="description"
      content="alkemart is a multi-vendor marketplace for Ghana. Compare multi-seller prices, shop from local sellers, and pay cash on delivery."
    />
    <meta name="theme-color" content="#F5C518" />
    <link rel="canonical" href="https://alkemart-storefront.vercel.app/" />
    <meta property="og:site_name" content="alkemart" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="alkemart — Ghana multi-vendor marketplace" />
    <meta
      property="og:description"
      content="Compare multi-seller prices, shop local, and pay cash on delivery on alkemart."
    />
    <meta property="og:url" content="https://alkemart-storefront.vercel.app/" />
    <meta
      property="og:image"
      content="https://alkemart-storefront.vercel.app/logo.svg"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="alkemart — Ghana multi-vendor marketplace" />
    <meta
      name="twitter:description"
      content="Compare multi-seller prices, shop local, and pay cash on delivery on alkemart."
    />
    <!-- Warm API + fonts early (catalog LCP depends on Railway) -->
    <link rel="preconnect" href="https://alkemart-api-production.up.railway.app" crossorigin />
    <link rel="dns-prefetch" href="https://alkemart-api-production.up.railway.app" />
    <!-- Faster first paint: system font first; Montserrat swaps in without blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <!-- Critical shell CSS — matches app chrome so React mount doesn’t flash white/nav HTML -->
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #f0f0f0;
        color: #2a2a2a;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #root { min-height: 100vh; }
      .boot {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        background: #f0f0f0;
      }
      .boot-header {
        height: 64px;
        background: #fff;
        border-bottom: 1px solid #d4d4d4;
      }
      .boot-rail {
        height: 52px;
        background: #fff;
        border-bottom: 1px solid #d4d4d4;
      }
      .boot-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .boot-spin {
        width: 28px;
        height: 28px;
        border: 3px solid #d4d4d4;
        border-top-color: #febf31;
        border-radius: 50%;
        animation: boot-spin 0.7s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      .boot-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <!--
      Boot shell matches live chrome (header + rail heights) to avoid layout glitch
      when JS mounts. SEO copy lives in <noscript> only — not a second “site” that flashes.
    -->
    <div id="root">
      <div class="boot" role="status" aria-live="polite" aria-busy="true">
        <div class="boot-header" aria-hidden="true"></div>
        <div class="boot-rail" aria-hidden="true"></div>
        <div class="boot-main">
          <div class="boot-spin" aria-hidden="true"></div>
          <span class="boot-sr">Loading alkemart…</span>
        </div>
      </div>
      <noscript>
        <main style="max-width:40rem;margin:2rem auto;padding:0 1rem;font-family:system-ui,sans-serif">
          <h1>alkemart — Ghana multi-vendor marketplace</h1>
          <p>
            Multi-vendor marketplace for Ghana. Compare multi-seller prices and
            pay cash on delivery.
          </p>
          <nav aria-label="Primary">
            <a href="/">Home</a> ·
            <a href="/about">About Us</a> ·
            <a href="/contact">Contact Us</a> ·
            <a href="/categories/all">Products</a> ·
            <a href="/help">Help</a> ·
            <a href="/privacy">Privacy</a>
          </nav>
          <p>Please enable JavaScript to shop on alkemart.</p>
        </main>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
