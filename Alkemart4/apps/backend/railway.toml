[build]
builder = "railpack"
buildCommand = "bun install && bun run build"

[deploy]
startCommand = "cd packages/api && node ./scripts/start-with-compression.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Non-secret env vars safe to commit. All secrets go in Railway dashboard.
[env]
NODE_ENV = "production"
PORT = "9000"
FILE_DRIVER = "s3"
# S3_REGION, S3_ENDPOINT, S3_BUCKET, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY,
# S3_FILE_URL → Railway dashboard (Variables tab)
# DATABASE_URL, REDIS_URL, JWT_SECRET, COOKIE_SECRET → Railway dashboard
# PAYSTACK_SECRET_KEY, RESEND_API_KEY → Railway dashboard
# AT_API_KEY, AT_USERNAME → Railway dashboard (Africa's Talking SMS/WhatsApp)
