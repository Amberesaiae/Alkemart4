# Alkemart Mercur/Medusa API + Admin (/dashboard) + Seller (/seller)
# Deploy from apps/backend (or /home/amber/alkemart-backend):
#   fly launch --copy-config --no-deploy   # first time
#   fly deploy
#
# Cost note: shared-cpu-1x @ 2GB is usually enough for Medusa; scale up if OOM.

app = 'alkemart-api'
primary_region = 'lhr'  # London — reasonable for GH/EU/US mix; change if needed

[build]
  dockerfile = 'Dockerfile'
  [build.args]
    # Overridden at deploy if you pass --build-arg; must match public URL after first deploy
    MERCUR_BACKEND_URL = 'https://alkemart-api.fly.dev'

[env]
  NODE_ENV = 'development'
  PORT = '9000'
  # Non-secrets only. Secrets → fly secrets set
  FILE_DRIVER = 'local'
  STORE_CORS = 'https://alkemart-storefront.vercel.app'
  # AUTH/ADMIN/VENDOR CORS set via secrets or redeploy after domain known

[http_service]
  internal_port = 9000
  force_https = true
  # Always-on for marketplace API (no cold start for shop → API)
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '60s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2048mb'
  cpus = 1
